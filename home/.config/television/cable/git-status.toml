[metadata]
name = "git-status"
description = "All changed and untracked files from git status"
requirements = ["git"]

[source]
command = "git status --porcelain | sed 's/^...//' | sed 's/\"//g'"

[preview]
command = "git diff HEAD --color=always -- '{}' 2>/dev/null || cat '{}'"

[ui]
layout = "portrait"

[keybindings]
ctrl-s = "actions:stage"
ctrl-r = "actions:restore"
ctrl-e = "actions:edit"

[actions.stage]
description = "Stage the selected file"
command = "git add '{}'"
mode = "fork"

[actions.restore]
description = "Discard changes in the selected file"
command = "git restore '{}'"
mode = "fork"

[actions.edit]
description = "Open the selected file in editor"
command = "${EDITOR:-vim} '{}'"
shell = "bash"
mode = "execute"
